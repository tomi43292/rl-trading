version: '3.8'

services:
  # Django API
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MARKETDATA_API_TOKEN=${MARKETDATA_API_TOKEN}
    volumes:
      - .:/app
      - trained_models:/app/trained_models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"

  # Celery Worker (handles async training + data ingestion)
  worker:
    build: .
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MARKETDATA_API_TOKEN=${MARKETDATA_API_TOKEN}
    volumes:
      - .:/app
      - trained_models:/app/trained_models
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A config worker -l info -c 2

  # Celery Beat (periodic tasks: price ingestion, indicator calculation)
  beat:
    build: .
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A config beat -l info

  # Redis (cache + Celery broker + result backend)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  trained_models:
